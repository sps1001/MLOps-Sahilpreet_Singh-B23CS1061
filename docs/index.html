<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLOps Portfolio — Sahilpreet Singh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --accent: #0ea5e9;
      --accent-soft: #38bdf8;
      --accent-dim: rgba(14, 165, 233, 0.14);
      --accent-glow: rgba(56, 189, 248, 0.24);
      --secondary: #14b8a6;
      --secondary-dim: rgba(20, 184, 166, 0.14);
      --lime: #22c55e;
      --bg-deep: #08111d;
      --bg-mid: #101d2d;
      --bg-elevated: rgba(234, 244, 250, 0.78);
      --bg-panel: rgba(209, 226, 238, 0.8);
      --text-bright: #0f172a;
      --text-muted: #52657f;
      --text-body: #2f4359;
      --border: rgba(96, 165, 250, 0.2);
      --border-strong: rgba(14, 165, 233, 0.36);
      --gradient-name: linear-gradient(115deg, #0f172a 0%, #0369a1 35%, #0ea5e9 70%, #14b8a6 100%);
      --gradient-warm: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 48%, #2dd4bf 100%);
      --gradient-cool: linear-gradient(135deg, rgba(14, 165, 233, 0.12), rgba(45, 212, 191, 0.06));
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --heading: "Sora", system-ui, sans-serif;
      --body-font: "Space Grotesk", system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--body-font);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 20%),
        radial-gradient(circle at top right, rgba(45, 212, 191, 0.1), transparent 18%),
        linear-gradient(180deg, #08111d 0%, #0b1624 44%, #0e1c2b 100%);
      color: var(--text-bright);
      min-height: 100vh;
      overflow-x: hidden;
      font-weight: 400;
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
    }

    .bg-animation {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      background: transparent;
    }

    .bg-animation::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(ellipse 50% 40% at 16% 18%, rgba(56, 189, 248, 0.22) 0%, transparent 52%),
        radial-gradient(ellipse 42% 36% at 82% 12%, rgba(45, 212, 191, 0.14) 0%, transparent 48%),
        radial-gradient(ellipse 45% 42% at 68% 80%, rgba(125, 211, 252, 0.14) 0%, transparent 52%),
        radial-gradient(circle at 44% 54%, rgba(4, 10, 18, 0.72) 0%, transparent 44%);
      animation: drift 28s ease-in-out infinite;
    }

    .bg-animation::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 42%, transparent 90%);
      opacity: 0.55;
      pointer-events: none;
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      40% {
        transform: translate(2%, -1%) scale(1.02);
      }

      70% {
        transform: translate(-1%, 2%) scale(0.99);
      }
    }

    ::-webkit-scrollbar {
      width: 9px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-mid);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(14, 165, 233, 0.24);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(14, 165, 233, 0.4);
    }

    .container {
      max-width: 1220px;
      margin: 0 auto;
      padding: 0 22px;
    }

    .header {
      padding: 40px 0 28px;
      position: relative;
    }

    .hero-shell {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(239, 248, 253, 0.7), rgba(200, 219, 233, 0.72)),
        rgba(220, 234, 244, 0.72);
      backdrop-filter: blur(18px);
      box-shadow:
        0 28px 70px rgba(88, 118, 143, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.52);
    }

    .hero-shell::before {
      content: "";
      position: absolute;
      inset: auto -10% -30% auto;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.16), transparent 66%);
      pointer-events: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.85fr);
      gap: 28px;
      padding: 36px;
      align-items: stretch;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    .hero-topline {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      color: #0369a1;
    }

    .header-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(232, 242, 249, 0.72);
      border: 1px solid var(--border);
    }

    .header-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 10px rgba(190, 242, 100, 0.6);
    }

    .avatar {
      width: 118px;
      height: 118px;
      border-radius: 32px;
      background: var(--gradient-warm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.35rem;
      font-weight: 800;
      color: #1f1206;
      letter-spacing: -0.02em;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.68) inset,
        0 22px 50px var(--accent-glow);
      transform: rotate(-5deg);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .avatar:hover {
      transform: rotate(0deg) scale(1.03);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.82) inset,
        0 26px 62px var(--accent-glow);
    }

    .hero-heading {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }

    .name {
      font-family: var(--heading);
      font-size: clamp(2.6rem, 7vw, 4.7rem);
      font-weight: 800;
      background: var(--gradient-name);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      line-height: 0.96;
      filter: drop-shadow(0 8px 18px rgba(125, 211, 252, 0.16));
    }

    @supports not (-webkit-background-clip: text) {
      .name {
        color: var(--text-bright);
        background: none;
        -webkit-text-fill-color: unset;
      }
    }

    .roll {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: var(--mono);
    }

    .hero-summary {
      max-width: 760px;
      color: var(--text-body);
      font-size: 1.07rem;
      line-height: 1.85;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .hero-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .hero-link svg {
      width: 18px;
      height: 18px;
    }

    .hero-link.primary {
      background: var(--gradient-warm);
      color: white;
      box-shadow: 0 16px 36px rgba(56, 189, 248, 0.2);
    }

    .hero-link.secondary {
      background: rgba(228, 239, 247, 0.76);
      color: var(--text-bright);
    }

    .hero-link:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .hero-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .metric {
      padding: 18px;
      border-radius: 20px;
      background: rgba(229, 239, 246, 0.74);
      border: 1px solid var(--border);
    }

    .metric-value {
      font-family: var(--heading);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 6px;
    }

    .metric-label {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hero-panel {
      position: relative;
      border-radius: 28px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(164, 200, 223, 0.8), rgba(188, 214, 231, 0.66)),
        var(--bg-panel);
      border: 1px solid rgba(96, 165, 250, 0.22);
      overflow: hidden;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: auto -10% -12% auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.14), transparent 70%);
      pointer-events: none;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent-soft);
      margin-bottom: 18px;
    }

    .panel-title {
      font-family: var(--heading);
      font-size: 1.45rem;
      line-height: 1.3;
      margin-bottom: 18px;
      max-width: 12ch;
    }

    .panel-list {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .panel-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      color: var(--text-body);
      line-height: 1.6;
    }

    .panel-item::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 8px;
      background: var(--gradient-warm);
      flex-shrink: 0;
    }

    .panel-note {
      border-radius: 18px;
      padding: 16px;
      background: rgba(231, 241, 248, 0.64);
      border: 1px solid rgba(96, 165, 250, 0.16);
    }

    .panel-note strong {
      display: block;
      font-family: var(--mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 8px;
    }

    .email {
      color: #0369a1;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: color 0.25s, filter 0.25s;
    }

    .email:hover {
      color: white;
      filter: drop-shadow(0 0 12px rgba(14, 165, 233, 0.22));
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin: 30px 0 8px;
      flex-wrap: wrap;
    }

    .nav-copy {
      max-width: 520px;
    }

    .eyebrow {
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent-soft);
      font-size: 0.74rem;
      margin-bottom: 8px;
    }

    .nav-title {
      font-family: var(--heading);
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .nav-description {
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 48ch;
    }

    .nav-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-btn {
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(226, 237, 245, 0.72);
      color: var(--text-bright);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      font-family: var(--body-font);
    }

    .nav-btn:hover {
      border-color: var(--border-strong);
      background: rgba(236, 245, 251, 0.88);
      transform: translateY(-2px);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.18) 0%, rgba(45, 212, 191, 0.16) 100%);
      border-color: rgba(14, 165, 233, 0.28);
      color: #0f172a;
      box-shadow: 0 10px 28px rgba(125, 211, 252, 0.22);
    }

    .section {
      padding: 34px 0 72px;
    }

    .section-title {
      font-family: var(--heading);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 26px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    .section-title span.accent-bar {
      width: 4px;
      height: 1.35em;
      border-radius: 4px;
      background: var(--gradient-warm);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 330px), 1fr));
      gap: 24px;
    }

    .card {
      background:
        linear-gradient(180deg, rgba(239, 247, 252, 0.76), rgba(212, 228, 239, 0.76)),
        var(--bg-elevated);
      border-radius: 26px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 42px rgba(92, 119, 142, 0.2);
      overflow: hidden;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--gradient-warm);
      opacity: 0.9;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -10% -28% auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12), transparent 72%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--border-strong);
      box-shadow: 0 24px 48px rgba(92, 119, 142, 0.28);
    }

    .card-header {
      padding: 26px 24px 0;
    }

    .card-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .badge-assignment {
      background: rgba(14, 165, 233, 0.1);
      color: #075985;
      border: 1px solid rgba(14, 165, 233, 0.2);
    }

    .badge-worksheet {
      background: rgba(45, 212, 191, 0.1);
      color: #0f766e;
      border: 1px solid rgba(45, 212, 191, 0.18);
    }

    .card-title {
      font-family: var(--heading);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.28;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    .card-subtitle {
      color: var(--text-muted);
      font-size: 0.84rem;
      margin-bottom: 16px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .card-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--accent-soft);
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .card-kicker::before {
      content: "";
      width: 28px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .card-body {
      padding: 0 24px 24px;
    }

    .card-description {
      color: var(--text-body);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 18px;
      font-weight: 400;
    }

    .card-stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: #1e293b;
      font-family: var(--mono);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(228, 238, 245, 0.76);
      border: 1px solid rgba(96, 165, 250, 0.16);
    }

    .stat svg {
      width: 15px;
      height: 15px;
      opacity: 0.95;
      color: var(--secondary);
      flex-shrink: 0;
    }

    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 16px;
      border-radius: 14px;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .link-btn svg {
      width: 15px;
      height: 15px;
    }

    .link-primary {
      background: var(--gradient-warm);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .link-primary:hover {
      box-shadow: 0 6px 24px rgba(14, 165, 233, 0.24);
      transform: translateY(-2px);
    }

    .link-secondary {
      background: rgba(228, 238, 245, 0.82);
      color: var(--text-bright);
      border: 1px solid var(--border);
    }

    .link-secondary:hover {
      border-color: rgba(14, 165, 233, 0.28);
      background: rgba(217, 233, 244, 0.9);
    }

    .link-wandb {
      background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
      color: white;
    }

    .link-wandb:hover {
      box-shadow: 0 6px 24px rgba(234, 88, 12, 0.35);
      transform: translateY(-2px);
    }

    .link-colab {
      background: linear-gradient(135deg, #f9ab00 0%, #e37400 100%);
      color: white;
    }

    .link-colab:hover {
      box-shadow: 0 6px 24px rgba(249, 171, 0, 0.35);
      transform: translateY(-2px);
    }

    .link-hf {
      background: linear-gradient(135deg, #ff9d00 0%, #ea580c 100%);
      color: white;
    }

    .link-hf:hover {
      box-shadow: 0 6px 24px rgba(255, 109, 0, 0.35);
      transform: translateY(-2px);
    }

    .footer {
      text-align: center;
      padding: 36px 0 48px;
      border-top: 1px solid var(--border);
      color: var(--text-body);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .footer a {
      color: var(--accent-soft);
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
      color: #0369a1;
    }

    @media (max-width: 768px) {
      .header {
        padding: 24px 0 24px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      .hero-heading {
        flex-direction: column;
      }

      .hero-metrics {
        grid-template-columns: 1fr;
      }

      .nav {
        margin-top: 24px;
      }

      .nav-controls {
        justify-content: flex-start;
      }

      .nav-btn {
        padding: 10px 18px;
        font-size: 0.88rem;
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 0 16px;
      }

      .hero-shell {
        border-radius: 26px;
      }

      .name {
        font-size: clamp(2.2rem, 12vw, 3.4rem);
      }

      .hero-summary,
      .nav-description,
      .panel-item,
      .panel-note,
      .card-description {
        font-size: 0.96rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg-animation" aria-hidden="true"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const REPO = "https://github.com/sps1001/MLOps-Sahilpreet_Singh-B23CS1061";
    const tree = (branch) => `${REPO}/tree/${branch}`;
    const blob = (branch, file) => `${REPO}/blob/${branch}/${encodeURIComponent(file)}`;

    const STAT_LABELS = {
      accuracy: "Accuracy",
      params: "Parameters",
      flops: "FLOPs",
      model: "Model",
      genres: "Genres",
    };

    const sectionMeta = {
      all: {
        eyebrow: "Portfolio Index",
        title: "Coursework shaped into deployable ML systems",
        description:
          "A compact view of experiments, reports, and build artifacts across deep learning and MLOps assignments.",
      },
      assignments: {
        eyebrow: "Core Track",
